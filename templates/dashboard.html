<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos ATO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1a;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;}
.topbar{background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:18px;font-weight:700;}
.logout{color:#ff6666;font-size:13px;text-decoration:none;margin-left:16px;}
.tabs{display:flex;gap:4px;padding:16px 16px 0;overflow-x:auto;border-bottom:1px solid #2a2a4a;}
.tab{padding:10px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:#8888aa;white-space:nowrap;border:none;background:none;transition:all .2s;}
.tab.active{background:#1a1a2e;color:#6c63ff;border:1px solid #2a2a4a;border-bottom:1px solid #1a1a2e;}
.panel{display:none;padding:20px 16px;}
.panel.active{display:block;}
.card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:16px;margin-bottom:12px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge.urgente{background:#3a1a1a;color:#ff6666;}
.badge.faltante{background:#1a1a3a;color:#8888ff;}
.badge.especial{background:#2a1a3a;color:#cc88ff;}
.badge.sugerido{background:#0a2a1a;color:#44cc88;}
.badge.pendiente{background:#1a1a3a;color:#8888ff;}
.badge.camino{background:#3a2a00;color:#ffaa00;}
.badge.llego{background:#0a2a1a;color:#44cc88;}
.badge.bodega{background:#1a2a3a;color:#44aaff;}
.badge.no-surtido{background:#2a1a1a;color:#ff4444;}
label{display:block;color:#aaaacc;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:14px;}
input,select,textarea{width:100%;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;padding:11px 13px;color:#fff;font-size:14px;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:#6c63ff;}
select option{background:#1a1a2e;}
textarea{resize:vertical;min-height:70px;}
.btn{display:inline-block;padding:11px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:#6c63ff;color:#fff;}
.btn-primary:hover{background:#574fd6;}
.btn-success{background:#1a4a2a;color:#44cc88;border:1px solid #2a6a3a;}
.btn-warn{background:#3a2a00;color:#ffaa00;border:1px solid #5a4a00;}
.btn-danger{background:#3a1a1a;color:#ff6666;border:1px solid #5a2a2a;}
.btn-wa{background:#1a3a1a;color:#44cc44;border:1px solid #2a5a2a;}
.btn-sm{padding:6px 12px;font-size:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.empty{text-align:center;color:#8888aa;padding:40px 20px;font-size:14px;}
.alert-ok{background:#0a2a1a;border:1px solid #2a5a3a;border-radius:8px;color:#44cc88;padding:10px 14px;margin-bottom:12px;display:none;font-size:13px;}
.section-title{font-size:15px;font-weight:700;color:#aaaacc;margin-bottom:12px;}
.top-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a4a;}
.top-item:last-child{border-bottom:none;}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filtros select{width:auto;padding:8px 12px;font-size:13px;}
.pedido-acciones{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.check-label{display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;cursor:pointer;color:#8888aa;font-size:13px;font-weight:400;}
.check-label input[type=checkbox]{width:auto;margin:0;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>📦 Pedidos ATO</h1>
    <span id="info-rol" style="font-size:12px;color:#8888aa"></span>
  </div>
  <div>
    <span id="info-nombre" style="color:#aaaacc;font-size:13px"></span>
    <a href="/logout" class="logout">Salir</a>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<script>
const ROL='{{ rol }}', NOMBRE='{{ nombre }}', TIENDA='{{ tienda }}';
document.getElementById('info-nombre').textContent=NOMBRE;
document.getElementById('info-rol').textContent=ROL==='bodega'?'Bodega / Admin':ROL==='encargado'?`Encargado · ${TIENDA}`:`Asesor · ${TIENDA}`;

const TABS={
  asesor:[{id:'nuevo',label:'➕ Nuevo pedido'},{id:'mis',label:'📋 Mis pedidos'}],
  encargado:[{id:'asesores',label:'👥 Asesores'},{id:'nuevo',label:'➕ Nuevo pedido'},{id:'mis',label:'📋 Pedidos tienda'},{id:'usuarios',label:'👤 Usuarios'}],
  bodega:[{id:'todos',label:'📋 Todos'},{id:'urgentes',label:'🚨 Urgentes'},{id:'top',label:'🔥 Más pedidos'},{id:'catalogo',label:'📦 Catálogo'},{id:'historial',label:'✅ Historial'},{id:'usuarios',label:'👤 Usuarios'}]
};

const tabs=TABS[ROL]||TABS.asesor;
const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');

tabs.forEach((t,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' active':'');
  btn.textContent=t.label;
  btn.onclick=()=>activarTab(t.id);
  btn.dataset.id=t.id;
  tabsEl.appendChild(btn);
  const div=document.createElement('div');
  div.className='panel'+(i===0?' active':'');
  div.id='panel-'+t.id;
  panelsEl.appendChild(div);
});

function activarTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
  cargarPanel(id);
}

function cargarPanel(id){
  if(id==='nuevo') renderNuevo();
  else if(id==='mis') cargarPedidos('mis');
  else if(id==='asesores') cargarPedidos('asesores');
  else if(id==='todos') cargarPedidos('todos');
  else if(id==='urgentes') cargarPedidos('urgentes');
  else if(id==='historial') cargarPedidos('historial');
  else if(id==='top') cargarTop();
  else if(id==='catalogo') cargarCatalogo();
  else if(id==='usuarios') cargarUsuarios();
}

// ── NUEVO PEDIDO CON CARRITO ──────────────────────────────────────────────────
let carrito=[];

async function renderNuevo(){
  const p=document.getElementById('panel-nuevo');
  const cats=await fetch('/api/categorias').then(r=>r.json());
  p.innerHTML=`
    <div class="alert-ok" id="ok-nuevo">✅ Pedidos enviados correctamente</div>
    <div class="card">
      <div class="section-title">Agregar al pedido</div>
      <label>Tipo</label>
      <select id="np-tipo">
        <option value="faltante">📋 Faltante / Reposición</option>
        <option value="especial">⭐ Especial</option>
        <option value="urgente">🚨 Urgente</option>
        <option value="sugerido">💡 Sugerido</option>
      </select>
      <label>Categoría</label>
      <select id="np-cat" onchange="cargarProductos()">
        <option value="">-- Selecciona categoría --</option>
        ${cats.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
      </select>
      <div id="campo-prod">
        <label>Producto</label>
        <select id="np-prod">
          <option value="">-- Selecciona categoría primero --</option>
        </select>
      </div>
      <div style="margin-top:10px">
        <label class="check-label">
          <input type="checkbox" id="np-nuevo" onchange="toggleNuevo()">
          No está en catálogo — especificar manualmente
        </label>
      </div>
      <div id="campo-nuevo" style="display:none">
        <label>Especifica el producto</label>
        <input id="np-prod-manual" placeholder="Ej: Funda magnética, Cable USB-C 3m...">
      </div>
      <label>Modelo / Marca</label>
      <input id="np-modelo" placeholder="Ej: iPhone 15, Samsung A54, Genérico...">
      <label>Cantidad</label>
      <input id="np-cant" placeholder="Ej: 5 piezas, 2 cajas...">
      <label>Nota (opcional)</label>
      <textarea id="np-nota" placeholder="Cualquier detalle adicional..."></textarea>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="agregarAlCarrito()">➕ Agregar al pedido</button>
      </div>
    </div>
    <div id="carrito-container"></div>`;
  renderCarrito();
}

async function cargarProductos(){
  const catId=document.getElementById('np-cat').value;
  const sel=document.getElementById('np-prod');
  if(!catId){
    sel.innerHTML='<option value="">-- Selecciona categoría primero --</option>';
    return;
  }
  sel.innerHTML='<option value="">Cargando...</option>';
  const prods=await fetch(`/api/productos?categoria_id=${catId}`).then(r=>r.json());
  if(!prods.length){
    sel.innerHTML='<option value="">Sin productos en esta categoría</option>';
    return;
  }
  sel.innerHTML='<option value="">-- Selecciona producto --</option>'+
    prods.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
}

function toggleNuevo(){
  const checked=document.getElementById('np-nuevo').checked;
  document.getElementById('campo-nuevo').style.display=checked?'block':'none';
  document.getElementById('campo-prod').style.display=checked?'none':'block';
  document.getElementById('np-cat').disabled=checked;
  document.getElementById('np-cat').style.opacity=checked?'0.4':'1';
}

function agregarAlCarrito(){
  const esNuevo=document.getElementById('np-nuevo')?.checked;
  const prodManual=document.getElementById('np-prod-manual')?.value.trim();
  const cant=document.getElementById('np-cant').value.trim();
  let prodNombre='', prodId=null;
  if(esNuevo){
    if(!prodManual){alert('Escribe el nombre del producto');return;}
    prodNombre=prodManual;
  } else {
    const prodSel=document.getElementById('np-prod');
    if(!prodSel||!prodSel.value){alert('Selecciona un producto del catálogo');return;}
    prodId=parseInt(prodSel.value);
    prodNombre=prodSel.options[prodSel.selectedIndex].textContent;
  }
  if(!cant){alert('Escribe la cantidad');return;}
  carrito.push({
    tipo:document.getElementById('np-tipo').value,
    producto_id:prodId,
    producto_nombre:prodNombre,
    cantidad:cant,
    modelo_marca:document.getElementById('np-modelo').value.trim(),
    nota:document.getElementById('np-nota').value.trim()
  });
  const catSel=document.getElementById('np-cat');
  if(catSel) catSel.value='';
  const prodSel=document.getElementById('np-prod');
  if(prodSel) prodSel.innerHTML='<option value="">-- Selecciona categoría primero --</option>';
  document.getElementById('np-cant').value='';
  document.getElementById('np-modelo').value='';
  document.getElementById('np-nota').value='';
  if(document.getElementById('np-prod-manual')) document.getElementById('np-prod-manual').value='';
  renderCarrito();
}

function renderCarrito(){
  const c=document.getElementById('carrito-container');
  if(!c) return;
  if(!carrito.length){
    c.innerHTML='<div style="color:#8888aa;font-size:13px;text-align:center;padding:16px">Aún no has agregado productos al pedido</div>';
    return;
  }
  c.innerHTML=`
    <div class="card">
      <div class="section-title">🛒 Pedido actual — ${carrito.length} producto${carrito.length>1?'s':''}</div>
      ${carrito.map((item,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2a4a">
          <div>
            <div style="font-weight:600">${item.producto_nombre}</div>
            <div style="font-size:12px;color:#8888aa">
              <span class="badge ${item.tipo}" style="font-size:10px">${item.tipo}</span>
              · ${item.cantidad}
              ${item.modelo_marca?` · ${item.modelo_marca}`:''}
              ${item.nota?` · 📝 ${item.nota}`:''}
            </div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="quitarDelCarrito(${i})">🗑</button>
        </div>`).join('')}
      <div style="margin-top:16px;display:flex;gap:10px">
        <button class="btn btn-primary" onclick="enviarCarrito()">📤 Enviar ${carrito.length} pedido${carrito.length>1?'s':''}</button>
        <button class="btn btn-danger btn-sm" onclick="limpiarCarrito()" style="padding:11px 16px">🗑 Limpiar todo</button>
      </div>
    </div>`;
}

function quitarDelCarrito(i){
  carrito.splice(i,1);
  renderCarrito();
}

function limpiarCarrito(){
  if(!confirm('¿Limpiar todos los productos del pedido?')) return;
  carrito=[];
  renderCarrito();
}

async function enviarCarrito(){
  if(!carrito.length){alert('No hay productos en el pedido');return;}
  let errores=0;
  for(const item of carrito){
    const res=await fetch('/api/pedidos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      tipo:item.tipo,
      producto_id:item.producto_id||null,
      producto_nombre:item.producto_nombre,
      cantidad:item.cantidad,
      modelo_marca:item.modelo_marca,
      nota:item.nota
    })});
    const data=await res.json();
    if(!data.ok) errores++;
  }
  if(errores===0){
    carrito=[];
    renderCarrito();
    mostrarOk('ok-nuevo');
  } else {
    alert(`Se enviaron ${carrito.length-errores} pedidos. ${errores} fallaron.`);
  }
}

// ── LISTAR PEDIDOS ────────────────────────────────────────────────────────────
const TIPO_ICON={urgente:'🚨',faltante:'📋',especial:'⭐',sugerido:'💡'};
const TIPO_COLOR={urgente:'#ff6666',faltante:'#8888ff',especial:'#cc88ff',sugerido:'#44cc88'};

async function cargarPedidos(modo){
  const p=document.getElementById('panel-'+modo);
  p.innerHTML='<div class="empty">Cargando...</div>';
  const esBodega=ROL==='bodega';
  const agrupar=esBodega&&(modo==='todos'||modo==='urgentes');
  let url='/api/pedidos?';
  if(modo==='urgentes') url+='tipo=urgente&';
  if(modo==='historial') url+='historial=1&';
  if(agrupar) url+='agrupar=1&';
  const lista=await fetch(url).then(r=>r.json());
  p.innerHTML=`
    <div class="filtros" style="margin-bottom:12px">
      <select id="f-tipo-${modo}" onchange="filtrarLista('${modo}')">
        <option value="">Todos los tipos</option>
        <option value="urgente">🚨 Urgente</option>
        <option value="faltante">📋 Faltante</option>
        <option value="especial">⭐ Especial</option>
        <option value="sugerido">💡 Sugerido</option>
      </select>
    </div>
    <div id="lista-${modo}">${agrupar?renderTablaAgrupada(lista,modo):renderTablaSimple(lista,modo)}</div>`;
  window['_pedidos_'+modo]=lista;
  window['_modo_agrupado_'+modo]=agrupar;
}

function filtrarLista(modo){
  const tipoF=document.getElementById('f-tipo-'+modo)?.value||'';
  let lista=window['_pedidos_'+modo]||[];
  const agrupar=window['_modo_agrupado_'+modo];
  if(tipoF) lista=lista.filter(x=>x.tipo===tipoF);
  document.getElementById('lista-'+modo).innerHTML=agrupar?renderTablaAgrupada(lista,modo):renderTablaSimple(lista,modo);
}

function renderTablaAgrupada(lista,modo){
  if(!lista.length) return '<div class="empty">No hay pedidos aquí</div>';
  return `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#1a1a2e;color:#8888aa;font-size:11px;text-transform:uppercase;letter-spacing:1px">
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a;white-space:nowrap">Tipo</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Producto</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Modelo / Marca</th>
          <th style="padding:10px 12px;text-align:center;border-bottom:1px solid #2a2a4a;white-space:nowrap">Total</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Tiendas que lo piden</th>
          <th style="padding:10px 12px;text-align:center;border-bottom:1px solid #2a2a4a">Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map((r,i)=>{
          const color=TIPO_COLOR[r.tipo]||'#8888ff';
          const icon=TIPO_ICON[r.tipo]||'📋';
          const bg=i%2===0?'#0f0f1a':'#141420';
          const tiendas=Array.isArray(r.tiendas)?r.tiendas:(r.tiendas||'').split(',').map(t=>t.trim()).filter(Boolean);
          const prod=r.producto_nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          const mod=(r.modelo_marca||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<tr style="background:${bg};border-bottom:1px solid #1a1a2a">
            <td style="padding:10px 12px;white-space:nowrap"><span style="color:${color};font-weight:700;font-size:12px">${icon} ${r.tipo}</span></td>
            <td style="padding:10px 12px;font-weight:600;color:#fff">${r.producto_nombre}</td>
            <td style="padding:10px 12px;color:#aaaaff">${r.modelo_marca||'—'}</td>
            <td style="padding:10px 12px;text-align:center;color:#fff;font-weight:600">${r.cantidad_total||r.num_pedidos} pzas</td>
            <td style="padding:10px 12px">
              <div style="display:flex;flex-wrap:wrap;gap:4px">
                ${tiendas.map(t=>`<span style="background:#2a2a4a;color:#aaaacc;padding:2px 8px;border-radius:20px;font-size:11px">${t}</span>`).join('')}
              </div>
            </td>
            <td style="padding:10px 12px">
              <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
                <button class="btn btn-success btn-sm" onclick="accionMasiva('${prod}','${mod}','${r.tipo}','llego','${modo}')">✅ Surtido</button>
                <button class="btn btn-warn btn-sm" onclick="accionMasiva('${prod}','${mod}','${r.tipo}','bodega','${modo}')">📦 Hay en bodega</button>
                <button class="btn btn-danger btn-sm" onclick="accionMasiva('${prod}','${mod}','${r.tipo}','no-surtido','${modo}')">❌ No surtir</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderTablaSimple(lista,modo){
  if(!lista.length) return '<div class="empty">No hay pedidos aquí</div>';
  return `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#1a1a2e;color:#8888aa;font-size:11px;text-transform:uppercase;letter-spacing:1px">
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Tipo</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Producto</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Modelo</th>
          <th style="padding:10px 12px;text-align:center;border-bottom:1px solid #2a2a4a">Cant.</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Tienda</th>
          <th style="padding:10px 12px;text-align:left;border-bottom:1px solid #2a2a4a">Estado</th>
          <th style="padding:10px 12px;text-align:center;border-bottom:1px solid #2a2a4a">Acción</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map((ped,i)=>{
          const color=TIPO_COLOR[ped.tipo]||'#8888ff';
          const icon=TIPO_ICON[ped.tipo]||'📋';
          const bg=i%2===0?'#0f0f1a':'#141420';
          return `<tr style="background:${bg};border-bottom:1px solid #1a1a2a">
            <td style="padding:10px 12px;white-space:nowrap"><span style="color:${color};font-weight:700;font-size:12px">${icon} ${ped.tipo}</span></td>
            <td style="padding:10px 12px;font-weight:600;color:#fff">${ped.producto_nombre}</td>
            <td style="padding:10px 12px;color:#aaaaff">${ped.modelo_marca||'—'}</td>
            <td style="padding:10px 12px;text-align:center;color:#fff">${ped.cantidad}</td>
            <td style="padding:10px 12px;color:#8888aa">${ped.tienda}</td>
            <td style="padding:10px 12px"><span class="badge ${ped.estado}">${ped.estado}</span></td>
            <td style="padding:10px 12px;text-align:center">
              ${ROL==='encargado'&&ped.estado==='pendiente'?`<button class="btn btn-success btn-sm" onclick="cambiarEstado(${ped.id},'llego',null,'${modo}')">✅ Ya lo llevé</button>`:''}
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

async function accionMasiva(producto,modelo,tipo,estado,modo){
  const msgs={llego:'¿Marcar como surtido para todas las tiendas?',bodega:'¿Marcar que hay en bodega para recoger?','no-surtido':'¿Marcar como no surtido?'};
  if(!confirm(msgs[estado]||'¿Confirmar?')) return;
  const res=await fetch('/api/pedidos/accion-masiva',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({producto_nombre:producto,modelo_marca:modelo,tipo,estado})});
  const data=await res.json();
  if(data.ok) cargarPedidos(modo);
  else alert(data.msg||'Error');
}

function renderAcciones(ped,modo){
  return '';
}

async function cambiarEstado(id,estado,fecha,modo){
  await fetch(`/api/pedidos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado,fecha_estimada:fecha})});
  cargarPedidos(modo);
}

async function guardarFecha(id,modo){
  const fecha=document.getElementById('fe-'+id).value;
  if(!fecha){alert('Selecciona una fecha');return;}
  await fetch(`/api/pedidos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado:'camino',fecha_estimada:fecha})});
  cargarPedidos(modo);
}

async function borrarPedido(id,modo){
  if(!confirm('¿Borrar este pedido?')) return;
  await fetch(`/api/pedidos/${id}`,{method:'DELETE'});
  cargarPedidos(modo);
}

async function enviarWA(id){
  const res=await fetch(`/api/whatsapp/${id}`);
  const data=await res.json();
  if(data.ok) window.open(data.link,'_blank');
  else alert('No hay teléfono del encargado');
}

// ── MÁS SOLICITADOS ───────────────────────────────────────────────────────────
async function cargarTop(){
  const p=document.getElementById('panel-top');
  p.innerHTML='<div class="empty">Cargando...</div>';
  const lista=await fetch('/api/mas-solicitados').then(r=>r.json());
  if(!lista.length){p.innerHTML='<div class="empty">No hay datos</div>';return;}
  p.innerHTML=`<div class="card">
    <div class="section-title">🔥 Más solicitados</div>
    ${lista.map((r,i)=>`
      <div class="top-item">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:20px;font-weight:700;color:#6c63ff;min-width:32px">${i+1}</span>
          <div>
            <div style="font-weight:600">${r.producto}</div>
            <span class="badge ${r.tipo}" style="font-size:10px">${r.tipo}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="color:#6c63ff;font-weight:700">${r.tiendas} tiendas</div>
          <div style="color:#8888aa;font-size:12px">${r.total} total</div>
        </div>
      </div>`).join('')}
  </div>`;
}

// ── CATÁLOGO ──────────────────────────────────────────────────────────────────
async function cargarCatalogo(){
  const p=document.getElementById('panel-catalogo');
  const cats=await fetch('/api/categorias').then(r=>r.json());
  p.innerHTML=`
    <div class="alert-ok" id="ok-cat">✅ Guardado</div>
    <div class="grid2" style="margin-bottom:16px">
      <div class="card">
        <div class="section-title">➕ Nueva categoría</div>
        <label>Nombre</label>
        <input id="c-nom" placeholder="Ej: Micas, Cargadores, Audífonos...">
        <div style="margin-top:12px">
          <button class="btn btn-primary btn-sm" onclick="crearCategoria()">Guardar</button>
        </div>
        <div class="section-title" style="margin-top:20px">📂 Categorías registradas</div>
        ${cats.length?cats.map(c=>`
          <div class="top-item">
            <span>${c.nombre}</span>
            <button class="btn btn-danger btn-sm" onclick="borrarCategoria(${c.id})">🗑</button>
          </div>`).join(''):'<div style="color:#8888aa;font-size:13px;padding:8px 0">Sin categorías aún</div>'}
      </div>
      <div class="card">
        <div class="section-title">ℹ️ ¿Cómo funciona?</div>
        <p style="font-size:13px;color:#8888aa;line-height:1.6">
          Las categorías son los grupos de productos que manejas:<br><br>
          📱 Micas<br>
          🔌 Cargadores<br>
          🎧 Audífonos<br>
          📦 Accesorios<br><br>
          Al hacer un pedido, el asesor selecciona la categoría y escribe el modelo o marca específico.
          Si el producto no está en ninguna categoría, puede marcarlo manualmente.
        </p>
      </div>
    </div>`;
}

async function crearCategoria(){
  const nom=document.getElementById('c-nom').value.trim();
  if(!nom){alert('Escribe el nombre');return;}
  const res=await fetch('/api/categorias',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nom})});
  const data=await res.json();
  if(data.ok){document.getElementById('c-nom').value='';mostrarOk('ok-cat');cargarCatalogo();}
  else alert(data.msg||'Error');
}

async function borrarCategoria(id){
  if(!confirm('¿Borrar esta categoría?')) return;
  await fetch(`/api/categorias/${id}`,{method:'DELETE'});
  cargarCatalogo();
}

// ── USUARIOS ──────────────────────────────────────────────────────────────────
async function cargarUsuarios(){
  const p=document.getElementById('panel-usuarios');
  const lista=await fetch('/api/usuarios').then(r=>r.json());
  p.innerHTML=`
    <div class="alert-ok" id="ok-usr">✅ Usuario creado</div>
    <div class="card" style="margin-bottom:16px">
      <div class="section-title">➕ Nuevo usuario</div>
      <div class="grid2">
        <div><label>Nombre</label><input id="u-nom" placeholder="Nombre completo"></div>
        <div><label>Usuario</label><input id="u-usr" placeholder="Para el login"></div>
      </div>
      <div class="grid2">
        <div><label>Contraseña</label><input id="u-pwd" type="password"></div>
        <div><label>Teléfono WA</label><input id="u-tel" placeholder="10 dígitos"></div>
      </div>
      <div class="grid2">
        <div><label>Rol</label>
          <select id="u-rol">
            <option value="asesor">Asesor</option>
            <option value="encargado">Encargado</option>
            ${ROL==='bodega'?'<option value="bodega">Bodega</option>':''}
          </select>
        </div>
        <div><label>Tienda</label><input id="u-tienda" placeholder="Nombre tienda"></div>
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="crearUsuario()">Crear usuario</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">👥 Usuarios registrados</div>
      ${lista.map(u=>`
        <div class="top-item">
          <div>
            <div style="font-weight:600">${u.nombre}</div>
            <div style="color:#8888aa;font-size:12px">@${u.usuario} · ${u.tienda}</div>
          </div>
          <span class="badge ${u.rol==='bodega'?'urgente':u.rol==='encargado'?'especial':'sugerido'}">${u.rol}</span>
        </div>`).join('')}
    </div>`;
}

async function crearUsuario(){
  const nom=document.getElementById('u-nom').value.trim();
  const usr=document.getElementById('u-usr').value.trim();
  const pwd=document.getElementById('u-pwd').value.trim();
  const tel=document.getElementById('u-tel').value.trim();
  const rol=document.getElementById('u-rol').value;
  const tienda=document.getElementById('u-tienda').value.trim();
  if(!nom||!usr||!pwd||!tienda){alert('Llena todos los campos');return;}
  const res=await fetch('/api/usuarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nom,usuario:usr,password:pwd,rol,tienda,telefono:tel})});
  const data=await res.json();
  if(data.ok){mostrarOk('ok-usr');cargarUsuarios();}
  else alert(data.msg||'Error');
}

function mostrarOk(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
cargarPanel(tabs[0].id);
