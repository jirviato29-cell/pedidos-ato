<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos ATO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f4f8;color:#1a1f36;font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.5;}

/* ── TOPBAR ── */
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar-logo{height:40px;width:auto;object-fit:contain;}
.topbar-logo-sm{height:28px;width:auto;object-fit:contain;}
.topbar-divider{width:1px;height:36px;background:#e2e8f0;}
.topbar h1{font-size:17px;font-weight:800;color:#1a2fa8;letter-spacing:-.3px;}
.topbar-rol{font-size:12px;color:#6b7280;display:block;margin-top:1px;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.topbar-user{color:#374151;font-size:13px;font-weight:600;}
.logout{color:#dc2626;font-size:13px;text-decoration:none;padding:6px 14px;border:1.5px solid #fca5a5;border-radius:7px;font-weight:600;transition:all .15s;}
.logout:hover{background:#fef2f2;}

/* ── TABS ── */
.tabs{display:flex;gap:4px;padding:16px 24px 0;overflow-x:auto;background:#fff;border-bottom:2px solid #e2e8f0;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280;white-space:nowrap;border:none;background:none;transition:all .15s;}
.tab:hover:not(.active){color:#1a2fa8;background:#eff3ff;}
.tab.active{background:#1a2fa8;color:#fff;}

/* ── PANELS ── */
.panel{display:none;padding:24px;max-width:1200px;margin:0 auto;}
.panel.active{display:block;}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.03);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.badge.urgente{background:#fef2f2;color:#dc2626;}
.badge.faltante{background:#eff6ff;color:#1d4ed8;}
.badge.demanda{background:#fff7ed;color:#ea580c;}
.badge.pendiente{background:#eff6ff;color:#1d4ed8;}
.badge.camino{background:#fff7ed;color:#ea580c;}
.badge.llego{background:#f0fdf4;color:#16a34a;}
.badge.bodega{background:#ecfeff;color:#0891b2;}
.badge.no-surtido{background:#fef2f2;color:#dc2626;}

/* ── FORMS ── */
label{display:block;color:#6b7280;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;margin-top:16px;}
input,select,textarea{width:100%;background:#fff;border:1.5px solid #d1d5db;border-radius:8px;padding:10px 13px;color:#1a1f36;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:#1a2fa8;box-shadow:0 0 0 3px #1a2fa820;}
select option{background:#fff;color:#1a1f36;}
textarea{resize:vertical;min-height:70px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-primary{background:#1a2fa8;color:#fff;}
.btn-primary:hover{background:#142285;}
.btn-success{background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;}
.btn-success:hover{background:#dcfce7;}
.btn-warn{background:#fff7ed;color:#ea580c;border:1.5px solid #fed7aa;}
.btn-warn:hover{background:#ffedd5;}
.btn-danger{background:#fef2f2;color:#dc2626;border:1.5px solid #fca5a5;}
.btn-danger:hover{background:#fee2e2;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}

/* ── DROPDOWN ── */
.dropdown{position:relative;display:inline-block;}
.dropdown-menu{display:none;position:absolute;right:0;top:calc(100% + 5px);background:#fff;border:1px solid #e2e8f0;border-radius:10px;min-width:170px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.12);overflow:hidden;}
.dropdown-menu.open{display:block;}
.dropdown-item{display:flex;align-items:center;gap:8px;width:100%;padding:11px 15px;font-size:13px;font-weight:500;color:#374151;background:none;border:none;cursor:pointer;text-align:left;transition:background .1s;white-space:nowrap;font-family:inherit;}
.dropdown-item:hover{background:#f9fafb;}
.dropdown-item.success{color:#16a34a;}
.dropdown-item.warn{color:#ea580c;}
.dropdown-item.danger{color:#dc2626;}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e2e8f0;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl thead tr{background:#f8fafc;}
.tbl th{padding:11px 14px;text-align:left;color:#6b7280;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #e2e8f0;white-space:nowrap;}
.tbl th:last-child{text-align:center;}
.tbl tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;}
.tbl tbody tr:last-child{border-bottom:none;}
.tbl tbody tr:nth-child(odd){background:#fff;}
.tbl tbody tr:nth-child(even){background:#fafbfc;}
.tbl tbody tr:hover{background:#eef2ff;}
.tbl td{padding:13px 14px;vertical-align:middle;color:#374151;}

/* ── MISC ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.empty{text-align:center;color:#9ca3af;padding:48px 20px;font-size:14px;}
.alert-ok{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;color:#15803d;padding:10px 14px;margin-bottom:14px;display:none;font-size:13px;font-weight:600;}
.section-title{font-size:12px;font-weight:700;color:#6b7280;margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;}
.top-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9;}
.top-item:last-child{border-bottom:none;}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filtros select{width:auto;padding:8px 12px;font-size:13px;}
.check-label{display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;cursor:pointer;color:#6b7280;font-size:13px;font-weight:500;}
.check-label input[type=checkbox]{width:auto;margin:0;}

/* ── MOBILE ── */
@media(max-width:640px){
  .panel{padding:16px 12px;}
  .topbar{padding:10px 14px;}
  .topbar h1{font-size:15px;}
  .topbar-logo{height:30px;}
  .topbar-logo-sm{height:22px;}
  .topbar-divider{display:none;}
  .grid2{grid-template-columns:1fr;}
  .col-hide{display:none;}
  .card{padding:14px;border-radius:10px;}
  .btn{padding:9px 14px;font-size:13px;}
  .tab{padding:8px 13px;font-size:12px;}
  .tabs{padding:12px 12px 0;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="/static/ato.png" alt="ATO" class="topbar-logo" onerror="this.style.display='none'">
    <div class="topbar-divider"></div>
    <div>
      <h1>Pedidos ATO</h1>
      <span id="info-rol" class="topbar-rol"></span>
    </div>
  </div>
  <div class="topbar-right">
    <img src="/static/telcel.jpeg" alt="Telcel" class="topbar-logo-sm" onerror="this.style.display='none'">
    <span id="info-nombre" class="topbar-user"></span>
    <a href="/logout" class="logout">Salir</a>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<script>
const ROL='{{ rol }}', NOMBRE='{{ nombre }}', TIENDA='{{ tienda }}';
document.getElementById('info-nombre').textContent=NOMBRE;
document.getElementById('info-rol').textContent=ROL==='bodega'?'Bodega / Admin':ROL==='encargado'?`Encargado · ${TIENDA}`:`Asesor · ${TIENDA}`;

const TABS={
  asesor:[{id:'nuevo',label:'➕ Nuevo pedido'},{id:'mis',label:'📋 Mis pedidos'}],
  encargado:[{id:'asesores',label:'👥 Asesores'},{id:'nuevo',label:'➕ Nuevo pedido'},{id:'mis',label:'📋 Pedidos tienda'},{id:'usuarios',label:'👤 Usuarios'}],
  bodega:[{id:'todos',label:'📋 Todos'},{id:'urgentes',label:'🚨 Urgentes'},{id:'top',label:'🔥 Más pedidos'},{id:'catalogo',label:'📦 Catálogo'},{id:'historial',label:'✅ Historial'},{id:'usuarios',label:'👤 Usuarios'}]
};

const tabs=TABS[ROL]||TABS.asesor;
const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');

tabs.forEach((t,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' active':'');
  btn.textContent=t.label;
  btn.onclick=()=>activarTab(t.id);
  btn.dataset.id=t.id;
  tabsEl.appendChild(btn);
  const div=document.createElement('div');
  div.className='panel'+(i===0?' active':'');
  div.id='panel-'+t.id;
  panelsEl.appendChild(div);
});

function activarTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
  cargarPanel(id);
}

function cargarPanel(id){
  if(id==='nuevo') renderNuevo();
  else if(id==='mis') cargarPedidos('mis');
  else if(id==='asesores') cargarAsesores();
  else if(id==='todos') cargarPedidos('todos');
  else if(id==='urgentes') cargarPedidos('urgentes');
  else if(id==='historial') cargarPedidos('historial');
  else if(id==='top') cargarTop();
  else if(id==='catalogo') cargarCatalogo();
  else if(id==='usuarios') cargarUsuarios();
}

// ── NUEVO PEDIDO CON CARRITO ──────────────────────────────────────────────────
let carrito=[];

async function renderNuevo(){
  const p=document.getElementById('panel-nuevo');
  const cats=await fetch('/api/categorias').then(r=>r.json());
  p.innerHTML=`
    <div class="alert-ok" id="ok-nuevo">✅ Pedidos enviados correctamente</div>
    <div class="card">
      <div class="section-title">Agregar al pedido</div>
      <label>Tipo</label>
      <select id="np-tipo">
        <option value="faltante">📦 Me falta en el módulo — lo vendí</option>
        <option value="demanda">🔁 Me lo piden mucho y no tengo</option>
        <option value="urgente">🚨 Pedido urgente</option>
      </select>
      <label>Categoría</label>
      <select id="np-cat" onchange="cargarProductos()">
        <option value="">-- Selecciona categoría --</option>
        ${cats.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
      </select>
      <div id="campo-prod">
        <label>Producto</label>
        <select id="np-prod">
          <option value="">-- Selecciona categoría primero --</option>
        </select>
      </div>
      <div style="margin-top:10px">
        <label class="check-label">
          <input type="checkbox" id="np-nuevo" onchange="toggleNuevo()">
          No está en catálogo — especificar manualmente
        </label>
      </div>
      <div id="campo-nuevo" style="display:none">
        <label>Especifica el producto</label>
        <input id="np-prod-manual" placeholder="Ej: Funda magnética, Cable USB-C 3m...">
      </div>
      <label>Modelo / Marca</label>
      <input id="np-modelo" placeholder="Ej: iPhone 15, Samsung A54, Genérico...">
      <label>Cantidad</label>
      <input id="np-cant" placeholder="Ej: 5 piezas, 2 cajas...">
      <label>Nota (opcional)</label>
      <textarea id="np-nota" placeholder="Cualquier detalle adicional..."></textarea>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="agregarAlCarrito()">➕ Agregar al pedido</button>
      </div>
    </div>
    <div id="carrito-container"></div>`;
  renderCarrito();
}

async function cargarProductos(){
  const catId=document.getElementById('np-cat').value;
  const sel=document.getElementById('np-prod');
  if(!catId){
    sel.innerHTML='<option value="">-- Selecciona categoría primero --</option>';
    return;
  }
  sel.innerHTML='<option value="">Cargando...</option>';
  const prods=await fetch(`/api/productos?categoria_id=${catId}`).then(r=>r.json());
  if(!prods.length){
    sel.innerHTML='<option value="">Sin productos en esta categoría</option>';
    return;
  }
  sel.innerHTML='<option value="">-- Selecciona producto --</option>'+
    prods.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
}

function toggleNuevo(){
  const checked=document.getElementById('np-nuevo').checked;
  document.getElementById('campo-nuevo').style.display=checked?'block':'none';
  document.getElementById('campo-prod').style.display=checked?'none':'block';
  document.getElementById('np-cat').disabled=checked;
  document.getElementById('np-cat').style.opacity=checked?'0.4':'1';
}

function agregarAlCarrito(){
  const esNuevo=document.getElementById('np-nuevo')?.checked;
  const prodManual=document.getElementById('np-prod-manual')?.value.trim();
  const cant=document.getElementById('np-cant').value.trim();
  let prodNombre='', prodId=null;
  if(esNuevo){
    if(!prodManual){alert('Escribe el nombre del producto');return;}
    prodNombre=prodManual;
  } else {
    const prodSel=document.getElementById('np-prod');
    if(!prodSel||!prodSel.value){alert('Selecciona un producto del catálogo');return;}
    prodId=parseInt(prodSel.value);
    prodNombre=prodSel.options[prodSel.selectedIndex].textContent;
  }
  if(!cant){alert('Escribe la cantidad');return;}
  carrito.push({
    tipo:document.getElementById('np-tipo').value,
    producto_id:prodId,
    producto_nombre:prodNombre,
    cantidad:cant,
    modelo_marca:document.getElementById('np-modelo').value.trim(),
    nota:document.getElementById('np-nota').value.trim()
  });
  const catSel=document.getElementById('np-cat');
  if(catSel) catSel.value='';
  const prodSel=document.getElementById('np-prod');
  if(prodSel) prodSel.innerHTML='<option value="">-- Selecciona categoría primero --</option>';
  document.getElementById('np-cant').value='';
  document.getElementById('np-modelo').value='';
  document.getElementById('np-nota').value='';
  if(document.getElementById('np-prod-manual')) document.getElementById('np-prod-manual').value='';
  renderCarrito();
}

function renderCarrito(){
  const c=document.getElementById('carrito-container');
  if(!c) return;
  if(!carrito.length){
    c.innerHTML='<div style="color:#8888aa;font-size:13px;text-align:center;padding:16px">Aún no has agregado productos al pedido</div>';
    return;
  }
  c.innerHTML=`
    <div class="card">
      <div class="section-title">🛒 Pedido actual — ${carrito.length} producto${carrito.length>1?'s':''}</div>
      ${carrito.map((item,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9">
          <div>
            <div style="font-weight:600;color:#1a1f36">${item.producto_nombre}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:3px">
              <span class="badge ${item.tipo}">${TIPO_ICON[item.tipo]||''} ${TIPO_LABEL[item.tipo]||item.tipo}</span>
              · ${item.cantidad}
              ${item.modelo_marca?` · ${item.modelo_marca}`:''}
              ${item.nota?` · 📝 ${item.nota}`:''}
            </div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="quitarDelCarrito(${i})">🗑</button>
        </div>`).join('')}
      <div style="margin-top:16px;display:flex;gap:10px">
        <button class="btn btn-primary" onclick="enviarCarrito()">📤 Enviar ${carrito.length} pedido${carrito.length>1?'s':''}</button>
        <button class="btn btn-danger btn-sm" onclick="limpiarCarrito()" style="padding:11px 16px">🗑 Limpiar todo</button>
      </div>
    </div>`;
}

function quitarDelCarrito(i){
  carrito.splice(i,1);
  renderCarrito();
}

function limpiarCarrito(){
  if(!confirm('¿Limpiar todos los productos del pedido?')) return;
  carrito=[];
  renderCarrito();
}

async function enviarCarrito(){
  if(!carrito.length){alert('No hay productos en el pedido');return;}
  let errores=0;
  for(const item of carrito){
    const res=await fetch('/api/pedidos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      tipo:item.tipo,
      producto_id:item.producto_id||null,
      producto_nombre:item.producto_nombre,
      cantidad:item.cantidad,
      modelo_marca:item.modelo_marca,
      nota:item.nota
    })});
    const data=await res.json();
    if(!data.ok) errores++;
  }
  if(errores===0){
    carrito=[];
    renderCarrito();
    mostrarOk('ok-nuevo');
  } else {
    alert(`Se enviaron ${carrito.length-errores} pedidos. ${errores} fallaron.`);
  }
}

// ── ASESORES (encargado) ──────────────────────────────────────────────────────
async function cargarAsesores(){
  const p=document.getElementById('panel-asesores');
  p.innerHTML='<div class="empty">Cargando...</div>';
  const lista=await fetch('/api/pedidos?').then(r=>r.json());
  if(!lista.length){p.innerHTML='<div class="empty">No hay pedidos en tu tienda</div>';return;}
  const porAsesor={};
  lista.forEach(ped=>{
    const nombre=ped.solicitante||'Sin nombre';
    if(!porAsesor[nombre]) porAsesor[nombre]=[];
    porAsesor[nombre].push(ped);
  });
  p.innerHTML=Object.entries(porAsesor).map(([nombre,pedidos])=>{
    const pendientes=pedidos.filter(x=>x.estado==='pendiente').length;
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="background:#eff3ff;color:#1a2fa8;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">👤</span>
          <span style="font-weight:700;font-size:15px;color:#1a1f36">${nombre}</span>
        </div>
        <span style="color:#6b7280;font-size:12px;background:#f3f4f6;padding:4px 10px;border-radius:20px">${pedidos.length} pedido${pedidos.length>1?'s':''} · <span style="color:${pendientes>0?'#dc2626':'#16a34a'}">${pendientes} pendiente${pendientes!==1?'s':''}</span></span>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th>Tipo</th>
            <th>Producto</th>
            <th class="col-hide">Modelo</th>
            <th style="text-align:center">Cant.</th>
            <th>Estado</th>
          </tr></thead>
          <tbody>${pedidos.map(ped=>{
            const icon=TIPO_ICON[ped.tipo]||'📋';
            return `<tr>
              <td><span class="badge ${ped.tipo}">${icon} ${TIPO_LABEL[ped.tipo]||ped.tipo}</span></td>
              <td style="font-weight:600;color:#1a1f36">${ped.producto_nombre}</td>
              <td class="col-hide" style="color:#6b7280">${ped.modelo_marca||'—'}</td>
              <td style="text-align:center;font-weight:600">${ped.cantidad}</td>
              <td><span class="badge ${ped.estado}">${ped.estado}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

// ── LISTAR PEDIDOS ────────────────────────────────────────────────────────────
const TIPO_ICON={urgente:'🚨',faltante:'📦',demanda:'🔁'};
const TIPO_LABEL={urgente:'Pedido urgente',faltante:'Lo vendí',demanda:'Muy pedido'};
const TIPO_COLOR={urgente:'#dc2626',faltante:'#1d4ed8',demanda:'#ea580c'};

async function cargarPedidos(modo){
  const p=document.getElementById('panel-'+modo);
  p.innerHTML='<div class="empty">Cargando...</div>';
  const esBodega=ROL==='bodega';
  const agrupar=esBodega&&(modo==='todos'||modo==='urgentes');
  let url='/api/pedidos?';
  if(modo==='urgentes') url+='tipo=urgente&';
  if(modo==='historial') url+='historial=1&';
  if(agrupar) url+='agrupar=1&';
  const lista=await fetch(url).then(r=>r.json());
  p.innerHTML=`
    <div class="filtros" style="margin-bottom:12px">
      <select id="f-tipo-${modo}" onchange="filtrarLista('${modo}')">
        <option value="">Todos los tipos</option>
        <option value="urgente">🚨 Pedido urgente</option>
        <option value="faltante">📦 Me falta en el módulo — lo vendí</option>
        <option value="demanda">🔁 Me lo piden mucho y no tengo</option>
      </select>
    </div>
    <div id="lista-${modo}">${agrupar?renderTablaAgrupada(lista,modo):renderTablaSimple(lista,modo)}</div>`;
  window['_pedidos_'+modo]=lista;
  window['_modo_agrupado_'+modo]=agrupar;
}

function filtrarLista(modo){
  const tipoF=document.getElementById('f-tipo-'+modo)?.value||'';
  let lista=window['_pedidos_'+modo]||[];
  const agrupar=window['_modo_agrupado_'+modo];
  if(tipoF) lista=lista.filter(x=>x.tipo===tipoF);
  document.getElementById('lista-'+modo).innerHTML=agrupar?renderTablaAgrupada(lista,modo):renderTablaSimple(lista,modo);
}

function renderTablaAgrupada(lista,modo){

async function accionMasiva(producto,modelo,tipo,estado,modo){
  const msgs={llego:'¿Marcar como surtido para todas las tiendas?',bodega:'¿Marcar que hay en bodega para recoger?','no-surtido':'¿Marcar como no surtido?'};
  if(!confirm(msgs[estado]||'¿Confirmar?')) return;
  const res=await fetch('/api/pedidos/accion-masiva',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({producto_nombre:producto,modelo_marca:modelo,tipo,estado})});
  const data=await res.json();
  if(data.ok) cargarPedidos(modo);
  else alert(data.msg||'Error');
}

async function cambiarEstado(id,estado,fecha,modo){
  await fetch(`/api/pedidos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado,fecha_estimada:fecha})});
  cargarPedidos(modo);
}

async function guardarFecha(id,modo){
  const fecha=document.getElementById('fe-'+id).value;
  if(!fecha){alert('Selecciona una fecha');return;}
  await fetch(`/api/pedidos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado:'camino',fecha_estimada:fecha})});
  cargarPedidos(modo);
}

async function borrarPedido(id,modo){
  if(!confirm('¿Borrar este pedido?')) return;
  await fetch(`/api/pedidos/${id}`,{method:'DELETE'});
  cargarPedidos(modo);
}

async function enviarWA(id){
  const res=await fetch(`/api/whatsapp/${id}`);
  const data=await res.json();
  if(data.ok) window.open(data.link,'_blank');
  else alert('No hay teléfono del encargado');
}

// ── CATÁLOGO ──────────────────────────────────────────────────────────────────
async function cargarCatalogo(){
  const p=document.getElementById('panel-catalogo');
  const cats=await fetch('/api/categorias').then(r=>r.json());
  p.innerHTML=`
    <div class="alert-ok" id="ok-cat">✅ Guardado</div>
    <div class="grid2" style="margin-bottom:16px">
      <div class="card">
        <div class="section-title">➕ Nueva categoría</div>
        <label>Nombre</label>
        <input id="c-nom" placeholder="Ej: Micas, Cargadores, Audífonos...">
        <div style="margin-top:12px">
          <button class="btn btn-primary btn-sm" onclick="crearCategoria()">Guardar</button>
        </div>
        <div class="section-title" style="margin-top:20px">📂 Categorías registradas</div>
        ${cats.length?cats.map(c=>`
          <div class="top-item">
            <span>${c.nombre}</span>
            <button class="btn btn-danger btn-sm" onclick="borrarCategoria(${c.id})">🗑</button>
          </div>`).join(''):'<div style="color:#8888aa;font-size:13px;padding:8px 0">Sin categorías aún</div>'}
      </div>
      <div class="card">
        <div class="section-title">ℹ️ ¿Cómo funciona?</div>
        <p style="font-size:13px;color:#8888aa;line-height:1.6">
          Las categorías son los grupos de productos que manejas:<br><br>
          📱 Micas<br>
          🔌 Cargadores<br>
          🎧 Audífonos<br>
          📦 Accesorios<br><br>
          Al hacer un pedido, el asesor selecciona la categoría y escribe el modelo o marca específico.
          Si el producto no está en ninguna categoría, puede marcarlo manualmente.
        </p>
      </div>
    </div>`;
}

async function crearCategoria(){
  const nom=document.getElementById('c-nom').value.trim();
  if(!nom){alert('Escribe el nombre');return;}
  const res=await fetch('/api/categorias',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nom})});
  const data=await res.json();
  if(data.ok){document.getElementById('c-nom').value='';mostrarOk('ok-cat');cargarCatalogo();}
  else alert(data.msg||'Error');
}

async function borrarCategoria(id){
  if(!confirm('¿Borrar esta categoría?')) return;
  await fetch(`/api/categorias/${id}`,{method:'DELETE'});
  cargarCatalogo();
}

function editarUsuario(id, nombre, tel, rol){
  document.getElementById('edit-usr-id').value=id;
  document.getElementById('edit-usr-label').textContent=nombre;
  document.getElementById('edit-tel').value=tel||'';
  document.getElementById('edit-rol').value=rol;
  document.getElementById('edit-pwd').value='';
  document.getElementById('form-edit-usr').style.display='block';
  document.getElementById('form-edit-usr').scrollIntoView({behavior:'smooth'});
}

function cerrarEdicion(){
  document.getElementById('form-edit-usr').style.display='none';
}

async function guardarEdicion(){
  const id=document.getElementById('edit-usr-id').value;
  const pwd=document.getElementById('edit-pwd').value.trim();
  const tel=document.getElementById('edit-tel').value.trim();
  const rol=document.getElementById('edit-rol').value;
  const body={telefono:tel,rol};
  if(pwd) body.password=pwd;
  const res=await fetch(`/api/usuarios/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.ok){mostrarOk('ok-usr');cargarUsuarios();}
  else alert(data.msg||'Error');
}

async function crearUsuario(){
  const nom=document.getElementById('u-nom').value.trim();
  const usr=document.getElementById('u-usr').value.trim();
  const pwd=document.getElementById('u-pwd').value.trim();
  const tel=document.getElementById('u-tel').value.trim();
  const rol=document.getElementById('u-rol').value;
  const tienda=document.getElementById('u-tienda').value.trim();
  if(!nom||!usr||!pwd||!tienda){alert('Llena todos los campos');return;}
  const res=await fetch('/api/usuarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nom,usuario:usr,password:pwd,rol,tienda,telefono:tel})});
  const data=await res.json();
  if(data.ok){mostrarOk('ok-usr');cargarUsuarios();}
  else alert(data.msg||'Error');
}

function mostrarOk(id){
  const el=document.getElementById(id);
  if(!el) return;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

// ── DROPDOWN ─────────────────────────────────────────────────────────────────
function toggleDropdown(btn){
  const menu=btn.nextElementSibling;
  document.querySelectorAll('.dropdown-menu.open').forEach(m=>{if(m!==menu)m.classList.remove('open');});
  menu.classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.dropdown'))
    document.querySelectorAll('.dropdown-menu.open').forEach(m=>m.classList.remove('open'));
});

// ── INIT ──────────────────────────────────────────────────────────────────────
cargarPanel(tabs[0].id);
