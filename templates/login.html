<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos ATO — Entrar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f0f1a; font-family: system-ui, sans-serif; }
  .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { color: #fff; font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .logo p { color: #8888aa; font-size: 13px; margin-top: 6px; }
  label { display: block; color: #aaaacc; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  input { width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 15px; margin-bottom: 20px; outline: none; transition: border .2s; }
  input:focus { border-color: #6c63ff; }
  button { width: 100%; background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s; }
  button:hover { background: #574fd6; }
  .error { background: #3a1a1a; border: 1px solid #ff4444; border-radius: 8px; color: #ff6666; font-size: 13px; padding: 10px 14px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>📦 PEDIDOS</h1>
    <p>Sistema de pedidos ATO</p>
  </div>
  <div class="error" id="err"></div>
  <label>Usuario</label>
  <input type="text" id="usr" placeholder="Tu usuario" autocomplete="username">
  <label>Contraseña</label>
  <input type="password" id="pwd" placeholder="Tu contraseña" autocomplete="current-password">
  <button onclick="entrar()">Entrar</button>
</div>
<script>
  document.addEventListener('keydown', e => { if(e.key === 'Enter') entrar(); });
  async function entrar() {
    const usr = document.getElementById('usr').value.trim();
    const pwd = document.getElementById('pwd').value.trim();
    if(!usr || !pwd) { mostrarError('Escribe tu usuario y contraseña'); return; }
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({usuario: usr, password: pwd})
    });
    const data = await res.json();
    if(data.ok) {
      window.location.href = '/dashboard';
    } else {
      mostrarError(data.msg || 'Error al entrar');
    }
  }
  function mostrarError(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
